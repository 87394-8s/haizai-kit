<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAIZAI KIT — 工作アイデアジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #12100E;
    --coral:  #E8522B;
    --cream:  #FBF7F2;
    --bone:   #E8E2D8;
    --gold:   #C89620;
    --mist:   #8C8680;
    --forest: #2E5E38;
    --card:   #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 1;
    padding: 40px 24px 0;
    max-width: 720px; margin: 0 auto;
  }

  .brand {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  .brand-bar {
    width: 5px; height: 48px;
    background: var(--coral); border-radius: 2px;
  }
  .brand-text h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px; font-weight: 900;
    letter-spacing: -0.5px; line-height: 1;
  }
  .brand-text p {
    font-size: 11px; color: var(--mist);
    letter-spacing: 2px; text-transform: uppercase;
    margin-top: 3px;
  }

  .hero-headline {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }
  .hero-headline em {
    font-style: normal;
    color: var(--coral);
    position: relative;
  }
  .hero-headline em::after {
    content: '';
    position: absolute; left: 0; bottom: 2px;
    width: 100%; height: 3px;
    background: var(--coral); opacity: 0.4;
  }

  .hero-sub {
    font-size: 14px; color: var(--mist);
    line-height: 1.7; margin-bottom: 36px;
  }

  /* ── INPUT AREA ── */
  .input-section {
    position: relative; z-index: 1;
    max-width: 720px; margin: 0 auto;
    padding: 0 24px;
  }

  .input-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--coral); margin-bottom: 10px;
  }

  .chips-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 16px;
  }
  .chip {
    background: var(--card);
    border: 1.5px solid var(--bone);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px; cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }
  .chip:hover { border-color: var(--coral); color: var(--coral); }
  .chip.active {
    background: var(--coral); color: white;
    border-color: var(--coral);
  }

  .input-wrapper {
    display: flex; gap: 10px; align-items: stretch;
    margin-bottom: 12px;
  }
  .text-input {
    flex: 1;
    background: var(--card);
    border: 2px solid var(--bone);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: var(--coral); }
  .text-input::placeholder { color: var(--bone); }

  .age-select {
    background: var(--card);
    border: 2px solid var(--bone);
    border-radius: 12px;
    padding: 14px 14px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none; cursor: pointer;
    transition: border-color 0.2s;
    appearance: none;
    min-width: 110px;
  }
  .age-select:focus { border-color: var(--coral); }

  .generate-btn {
    width: 100%;
    background: var(--ink);
    color: white;
    border: none; border-radius: 12px;
    padding: 16px;
    font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative; overflow: hidden;
    letter-spacing: 1px;
  }
  .generate-btn:hover { background: var(--coral); transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── LOADING ── */
  .loading {
    display: none;
    text-align: center;
    padding: 48px 24px;
    max-width: 720px; margin: 0 auto;
  }
  .loading.show { display: block; }

  .loading-dots {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 16px;
  }
  .dot {
    width: 10px; height: 10px;
    background: var(--coral); border-radius: 50%;
    animation: bounce 1.2s ease infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-10px); opacity: 1; }
  }
  .loading p { font-size: 14px; color: var(--mist); }

  /* ── RESULTS ── */
  .results {
    max-width: 720px; margin: 0 auto;
    padding: 24px 24px 60px;
    position: relative; z-index: 1;
  }

  .results-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .results-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--forest);
  }
  .result-count {
    font-size: 12px; color: var(--mist);
    background: var(--bone); border-radius: 100px;
    padding: 3px 10px;
  }

  .idea-card {
    background: var(--card);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    border: 1.5px solid var(--bone);
    animation: slideUp 0.4s ease both;
  }
  .idea-card:nth-child(2) { animation-delay: 0.08s; }
  .idea-card:nth-child(3) { animation-delay: 0.16s; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    padding: 20px 20px 0;
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px;
  }
  .card-num {
    width: 32px; height: 32px; flex-shrink: 0;
    background: var(--coral); color: white;
    border-radius: 50%;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
  }
  .card-title-wrap { flex: 1; }
  .card-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 20px; font-weight: 700;
    line-height: 1.2; margin-bottom: 4px;
  }
  .card-time {
    font-size: 11px; color: var(--mist);
    letter-spacing: 1px;
  }
  .difficulty-badge {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 100px;
  }
  .diff-easy   { background: #E8F5E9; color: var(--forest); }
  .diff-normal { background: #FFF3E0; color: #E65100; }
  .diff-hard   { background: #FCE4EC; color: #C62828; }

  .card-body { padding: 16px 20px 20px; }

  .steps-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--mist); margin-bottom: 10px;
  }
  .step-item {
    display: flex; gap: 10px;
    margin-bottom: 10px; font-size: 13px;
    line-height: 1.6;
  }
  .step-num {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1.5px solid var(--coral); color: var(--coral);
    border-radius: 50%; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
  }

  .card-footer {
    padding: 12px 20px;
    background: var(--cream);
    border-top: 1px solid var(--bone);
    display: flex; flex-wrap: wrap; gap: 8px;
    align-items: center;
  }
  .recycle-tag {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--forest); font-weight: 700;
    background: #E8F5E9; border-radius: 100px;
    padding: 4px 10px;
  }
  .share-hint {
    font-size: 11px; color: var(--mist); margin-left: auto;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    max-width: 720px; margin: 0 auto;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700; margin-bottom: 8px;
  }
  .empty-sub { font-size: 13px; color: var(--mist); line-height: 1.7; }

  /* ── ERROR ── */
  .error-box {
    display: none;
    background: #FFF3F3; border: 1.5px solid #FFCDD2;
    border-radius: 12px; padding: 16px 20px;
    margin: 16px 24px; max-width: 720px;
    font-size: 13px; color: #C62828;
  }
  .error-box.show { display: block; }

  /* ── FOOTER ── */
  .page-footer {
    text-align: center;
    padding: 24px;
    font-size: 11px; color: var(--mist);
    letter-spacing: 1px;
    position: relative; z-index: 1;
  }

  /* ── DIVIDER ── */
  .divider {
    max-width: 720px; margin: 28px auto;
    padding: 0 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--bone); }
  .divider-text { font-size: 11px; color: var(--mist); letter-spacing: 2px; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-bar"></div>
    <div class="brand-text">
      <h1>HAIZAI KIT</h1>
      <p>Creative Reuse Tool</p>
    </div>
  </div>

  <h2 class="hero-headline">
    家にある廃材を<br>
    <em>アイデアに変える</em>。
  </h2>
  <p class="hero-sub">
    段ボール・トイレットペーパーの芯・牛乳パック…<br>
    手元にある素材を入力するだけで、工作アイデアと作り方を提案します。
  </p>
</header>

<div class="input-section">
  <div class="input-label">素材を選ぶ or 入力する</div>

  <div class="chips-row" id="chipsRow">
    <div class="chip" onclick="toggleChip(this, 'トイレットペーパーの芯')">🧻 トイレットペーパーの芯</div>
    <div class="chip" onclick="toggleChip(this, '段ボール')">📦 段ボール</div>
    <div class="chip" onclick="toggleChip(this, '牛乳パック')">🥛 牛乳パック</div>
    <div class="chip" onclick="toggleChip(this, '新聞紙')">📰 新聞紙</div>
    <div class="chip" onclick="toggleChip(this, 'ペットボトル')">🍶 ペットボトル</div>
    <div class="chip" onclick="toggleChip(this, '空き箱')">🎁 空き箱</div>
    <div class="chip" onclick="toggleChip(this, 'ラップの芯')">🌀 ラップの芯</div>
    <div class="chip" onclick="toggleChip(this, '卵パック')">🥚 卵パック</div>
  </div>

  <div class="input-wrapper">
    <input
      type="text"
      class="text-input"
      id="materialInput"
      placeholder="他の素材を入力（例：木の枝、布切れ）"
    />
    <select class="age-select" id="ageSelect">
      <option value="3〜5歳">3〜5歳</option>
      <option value="6〜8歳" selected>6〜8歳</option>
      <option value="9〜12歳">9〜12歳</option>
      <option value="親子一緒">親子一緒</option>
    </select>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generate()">
    工作アイデアを生成する →
  </button>

  <div class="error-box" id="errorBox"></div>
</div>

<div class="loading" id="loading">
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <p>アイデアを考えています…</p>
</div>

<div id="resultsArea"></div>

<div class="page-footer">
  HAIZAI KIT — 捨て方を教える、一生モノの創造力。<br>
  近畿大学 経営学部商学科 × KINCUBA basecamp
</div>

<script>
const selectedChips = new Set();

function toggleChip(el, value) {
  if (selectedChips.has(value)) {
    selectedChips.delete(value);
    el.classList.remove('active');
  } else {
    selectedChips.add(value);
    el.classList.add('active');
  }
}

function getMaterials() {
  const manual = document.getElementById('materialInput').value.trim();
  const chips = [...selectedChips];
  const all = [...chips, ...(manual ? [manual] : [])];
  return all;
}

function getDifficultyClass(diff) {
  if (diff === 'かんたん') return 'diff-easy';
  if (diff === 'ふつう') return 'diff-normal';
  return 'diff-hard';
}

async function generate() {
  const materials = getMaterials();
  const age = document.getElementById('ageSelect').value;

  if (materials.length === 0) {
    showError('素材を選ぶか入力してください。');
    return;
  }

  const btn = document.getElementById('generateBtn');
  const loading = document.getElementById('loading');
  const resultsArea = document.getElementById('resultsArea');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = true;
  loading.classList.add('show');
  resultsArea.innerHTML = '';
  errorBox.classList.remove('show');

  const prompt = `
あなたは子ども向け工作の専門家です。
以下の廃材素材を使った工作アイデアを3つ提案してください。

【使用素材】${materials.join('、')}
【対象年齢】${age}

以下のJSON形式のみで回答してください。説明文や前置きは一切不要です：
{
  "ideas": [
    {
      "title": "作品名",
      "time": "所要時間（例：30分）",
      "difficulty": "かんたん or ふつう or むずかしい",
      "steps": ["手順1", "手順2", "手順3", "手順4"],
      "recycle_tip": "遊び終わった後の分別方法（1文で）"
    }
  ]
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    loading.classList.remove('show');
    renderResults(parsed.ideas, materials, age);

  } catch (err) {
    loading.classList.remove('show');
    showError('アイデアの生成に失敗しました。もう一度お試しください。');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

function renderResults(ideas, materials, age) {
  const area = document.getElementById('resultsArea');

  const header = `
    <div class="results">
      <div class="results-header">
        <div class="results-label">工作アイデア</div>
        <div class="result-count">${materials.join('・')} ／ ${age}</div>
      </div>
      ${ideas.map((idea, i) => renderCard(idea, i + 1)).join('')}
    </div>`;

  area.innerHTML = header;
}

function renderCard(idea, num) {
  const diffClass = getDifficultyClass(idea.difficulty);
  const steps = idea.steps.map((s, i) => `
    <div class="step-item">
      <div class="step-num">${i + 1}</div>
      <div>${s}</div>
    </div>`).join('');

  return `
    <div class="idea-card">
      <div class="card-top">
        <div class="card-num">${num}</div>
        <div class="card-title-wrap">
          <div class="card-title">${idea.title}</div>
          <div class="card-time">⏱ 約${idea.time}</div>
        </div>
        <div class="difficulty-badge ${diffClass}">${idea.difficulty}</div>
      </div>
      <div class="card-body">
        <div class="steps-label">つくり方</div>
        ${steps}
      </div>
      <div class="card-footer">
        <div class="recycle-tag">
          <span>♻️</span>
          <span>${idea.recycle_tip}</span>
        </div>
        <div class="share-hint">#HAIZAIKIT</div>
      </div>
    </div>`;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('materialInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });
});
